<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performans Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-gray-800">

    <!-- Sidebar & Layout -->
    <div class="flex h-screen overflow-hidden">
        
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-xl z-20">
            <div class="p-6 border-b border-slate-700 font-bold text-xl tracking-wide">
                🚀 Dashboard
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <a href="#" onclick="loadView('dashboard')" class="block px-4 py-3 rounded-lg bg-blue-600 hover:bg-blue-700 transition">Genel Bakış</a>
                <a href="#" onclick="loadView('team')" class="block px-4 py-3 rounded-lg hover:bg-slate-800 transition text-slate-300">Takım Detayı</a>
            </nav>
            <div class="p-4 border-t border-slate-700 text-xs text-slate-400">
                v2.0 • Supabase Connected
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden relative">
            
            <!-- Topbar -->
            <header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-8 shadow-sm z-10">
                <h1 class="text-xl font-bold text-gray-700">Operasyon Özeti</h1>
                <div class="flex items-center gap-4">
                    <select id="periodFilter" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2">
                        <option>Dönem Yükleniyor...</option>
                    </select>
                    <button onclick="fetchData()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition shadow-lg shadow-blue-500/30">
                        Yenile
                    </button>
                </div>
            </header>

            <!-- Scrollable Content -->
            <div class="flex-1 overflow-auto p-8">
                
                <!-- KPI Cards -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <!-- Card 1 -->
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 relative overflow-hidden group">
                        <div class="absolute right-0 top-0 h-full w-1 bg-blue-500"></div>
                        <p class="text-sm font-semibold text-gray-400 uppercase">Toplam CWT (Saat)</p>
                        <h3 class="text-3xl font-bold text-gray-800 mt-2" id="kpi-cwt">-</h3>
                    </div>
                    <!-- Card 2 -->
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 relative overflow-hidden group">
                        <div class="absolute right-0 top-0 h-full w-1 bg-green-500"></div>
                        <p class="text-sm font-semibold text-gray-400 uppercase">Toplam FTE</p>
                        <h3 class="text-3xl font-bold text-gray-800 mt-2" id="kpi-fte">-</h3>
                    </div>
                    <!-- Card 3 -->
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 relative overflow-hidden group">
                        <div class="absolute right-0 top-0 h-full w-1 bg-purple-500"></div>
                        <p class="text-sm font-semibold text-gray-400 uppercase">Verimlilik %</p>
                        <h3 class="text-3xl font-bold text-gray-800 mt-2" id="kpi-eff">-</h3>
                    </div>
                     <!-- Card 4 -->
                     <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 relative overflow-hidden group">
                        <div class="absolute right-0 top-0 h-full w-1 bg-orange-500"></div>
                        <p class="text-sm font-semibold text-gray-400 uppercase">Mola Oranı %</p>
                        <h3 class="text-3xl font-bold text-gray-800 mt-2" id="kpi-break">-</h3>
                    </div>
                </div>

                <!-- Charts Area -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <h4 class="font-bold text-gray-700 mb-4">Günlük CWT Trendi</h4>
                        <canvas id="chartTrend" height="250"></canvas>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <h4 class="font-bold text-gray-700 mb-4">Takım Bazlı Dağılım</h4>
                        <canvas id="chartTeam" height="250"></canvas>
                    </div>
                </div>

                <!-- Data Table -->
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                        <h3 class="font-bold text-gray-700">Personel Detayları</h3>
                        <input type="text" id="searchInput" placeholder="Personel Ara..." class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-gray-50 text-gray-500 uppercase text-xs">
                                <tr>
                                    <th class="px-6 py-4">Personel</th>
                                    <th class="px-6 py-4">Takım Lideri</th>
                                    <th class="px-6 py-4">Toplam CWT (Saat)</th>
                                    <th class="px-6 py-4">FTE</th>
                                    <th class="px-6 py-4 text-center">Durum</th>
                                </tr>
                            </thead>
                            <tbody id="dataTableBody" class="divide-y divide-gray-100 text-sm">
                                <!-- Data inject via JS -->
                                <tr><td colspan="5" class="px-6 py-8 text-center text-gray-400">Veri yükleniyor...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        // --- SUPABASE CONF ---
        // Buraya kendi URL ve Anon Key bilgilerini gir
        const SUPABASE_URL = 'https://xtikjrtxowjcpvbmsgxh.supabase.co';
        const SUPABASE_KEY = 'Senin_Anon_Key'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let globalData = [];
        let trendChart, teamChart;

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', async () => {
            await loadPeriods();
            fetchData();
        });

        async function loadPeriods() {
            // Distinct periodları çekelim (Bu tablo yapına göre değişebilir, daily_data'dan distinct çekiyoruz)
            const { data, error } = await _supabase
                .from('daily_data')
                .select('period')
                .order('period', { ascending: false }); // Limit koymuyoruz, distinct JS tarafında

            if(data) {
                const uniquePeriods = [...new Set(data.map(item => item.period))];
                const select = document.getElementById('periodFilter');
                select.innerHTML = uniquePeriods.map(p => `<option value="${p}">${p}</option>`).join('');
            }
        }

        async function fetchData() {
            const period = document.getElementById('periodFilter').value;
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4">Yükleniyor...</td></tr>';

            const { data, error } = await _supabase
                .from('daily_data')
                .select('*')
                .eq('period', period);

            if (error) {
                console.error(error);
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-red-500">Veri çekilemedi.</td></tr>';
                return;
            }

            globalData = data;
            renderDashboard(data);
        }

        function renderDashboard(data) {
            // 1. Calculate Aggregates
            // Bu örnekte CWT dakika olarak geldiğini varsayıyorum. Saate çevirelim.
            const totalCWTMinutes = data.reduce((acc, curr) => acc + (curr.cwt_time || 0), 0);
            const totalCWTHours = (totalCWTMinutes / 60).toFixed(1);
            
            // FTE Hesabı: (Toplam CWT Dakika) / (Gün Sayısı * Günlük Çalışma Dakikası) gibi karmaşık olabilir.
            // Basitlik için: Toplam CWT Saat / 180 (Örnek aylık hedef) diyelim.
            // Senin logic'ine göre FTE'yi script'ten de alabiliriz.
            const totalFTE = (totalCWTHours / 180).toFixed(2); // ÖRNEK

            document.getElementById('kpi-cwt').innerText = totalCWTHours;
            document.getElementById('kpi-fte').innerText = totalFTE;
            
            // 2. Tabloyu Doldur (Özetleyerek)
            // Kullanıcı bazında gruplayalım
            const userGroups = {};
            data.forEach(row => {
                if(!userGroups[row.user_name]) {
                    userGroups[row.user_name] = { 
                        name: row.user_name, 
                        leader: row.team_leader, 
                        cwt: 0 
                    };
                }
                userGroups[row.user_name].cwt += (row.cwt_time || 0);
            });

            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '';
            
            Object.values(userGroups).forEach(user => {
                const hours = (user.cwt / 60).toFixed(1);
                const userFte = (hours / 180).toFixed(2); // Örnek hedef
                
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition";
                tr.innerHTML = `
                    <td class="px-6 py-4 font-medium text-gray-900">${user.name}</td>
                    <td class="px-6 py-4 text-gray-500">${user.leader || '-'}</td>
                    <td class="px-6 py-4 text-blue-600 font-bold">${hours}</td>
                    <td class="px-6 py-4">${userFte}</td>
                    <td class="px-6 py-4 text-center">
                        <span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold">Aktif</span>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            // 3. Charts
            updateCharts(data);
        }

        function updateCharts(data) {
            // Günlük Trend Chart
            // Tarihe göre grupla
            const dateMap = {};
            data.forEach(d => {
                if(!dateMap[d.date]) dateMap[d.date] = 0;
                dateMap[d.date] += (d.cwt_time || 0) / 60; // Saat
            });
            
            const labels = Object.keys(dateMap).sort();
            const values = labels.map(l => dateMap[l]);

            const ctx1 = document.getElementById('chartTrend').getContext('2d');
            if(trendChart) trendChart.destroy();
            trendChart = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Günlük Toplam Saat',
                        data: values,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });

            // Takım Chart (Doughnut)
            // Lidere göre grupla
            const teamMap = {};
            data.forEach(d => {
                const tl = d.team_leader || 'Tanımsız';
                if(!teamMap[tl]) teamMap[tl] = 0;
                teamMap[tl] += (d.cwt_time || 0);
            });

            const ctx2 = document.getElementById('chartTeam').getContext('2d');
            if(teamChart) teamChart.destroy();
            teamChart = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(teamMap),
                    datasets: [{
                        data: Object.values(teamMap),
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6']
                    }]
                }
            });
        }
        
        // Basit Arama
        document.getElementById('searchInput').addEventListener('keyup', (e) => {
            const val = e.target.value.toLowerCase();
            const rows = document.querySelectorAll('#dataTableBody tr');
            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                row.style.display = text.includes(val) ? '' : 'none';
            });
        });

    </script>
</body>
</html>
